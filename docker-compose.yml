name: litellm-free-gateway

x-default-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - litellm
    <<: *default-logging

  redis:
    image: redis:7.2-alpine
    profiles: ["local-redis"]
    restart: unless-stopped
    command:
      - sh
      - -c
      - >
        exec redis-server
        --appendonly yes
        --requirepass "$${REDIS_PASSWORD}"
        --maxmemory "$${REDIS_MAXMEMORY:-256mb}"
        --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - litellm
    <<: *default-logging

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm-database:main-latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY in .env}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?Set LITELLM_SALT_KEY in .env}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_HOST: ${REDIS_HOST:?Set REDIS_HOST in .env}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_API_BASE: ${CEREBRAS_API_BASE:-https://api.cerebras.ai/v1}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-https://ollama.com/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}
      OR_SITE_URL: ${OR_SITE_URL:-http://localhost:4000}
      OR_APP_NAME: ${OR_APP_NAME:-LiteLLM Simple Quality Gateway}
      VERCEL_AI_GATEWAY_API_KEY: ${VERCEL_AI_GATEWAY_API_KEY:-}
      VERCEL_AI_GATEWAY_API_BASE: ${VERCEL_AI_GATEWAY_API_BASE:-https://ai-gateway.vercel.sh/v1}
      LIGHTNING_AI_API_KEY: ${LIGHTNING_AI_API_KEY:-}
      LIGHTNING_AI_API_BASE: ${LIGHTNING_AI_API_BASE:-https://lightning.ai/api/v1}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_OTEL_HOST: ${LANGFUSE_OTEL_HOST:-https://cloud.langfuse.com}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      STORE_MODEL_IN_DB: ${STORE_MODEL_IN_DB:-False}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; r = urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5); sys.exit(0 if r.status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    networks:
      - litellm
    <<: *default-logging

networks:
  litellm:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
