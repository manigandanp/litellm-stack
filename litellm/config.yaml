litellm_settings:
  # callbacks: ["langfuse_otel"]
  json_logs: true
  request_timeout: 120
  drop_params: true
  turn_off_message_logging: false
  redact_user_api_key_info: true
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    namespace: litellm:response-cache
    ttl: 600
    mode: default_off
    max_connections: 100
  enable_redis_auth_cache: true

router_settings:
  routing_strategy: latency-based-routing
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  enable_pre_call_checks: true
  num_retries: 2
  timeout: 120
  allowed_fails: 2
  cooldown_time: 60
  retry_policy:
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 2
    InternalServerErrorRetries: 2
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
  allowed_fails_policy:
    TimeoutErrorAllowedFails: 3
    RateLimitErrorAllowedFails: 10000
    InternalServerErrorAllowedFails: 3
    AuthenticationErrorAllowedFails: 1
    BadRequestErrorAllowedFails: 1000
  fallbacks:
    - rough-use: ["smart-mini", "smart-large"]
    - coding: ["smart-large", "rough-use"]
    - smart-mini: ["rough-use", "smart-large"]
    - smart-large: ["rough-use", "smart-mini"]
  context_window_fallbacks:
    - rough-use: ["smart-large"]
    - coding: ["smart-large", "rough-use"]
    - smart-mini: ["smart-large", "rough-use"]
    - smart-large: ["rough-use"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 10
  database_connection_timeout: 60
  store_prompts_in_spend_logs: true
  disable_master_key_return: true
  background_health_checks: false
  health_check_interval: 3000
  health_check_details: false
  maximum_spend_logs_retention_period: 30d
  maximum_spend_logs_retention_interval: 1d
  proxy_batch_write_at: 10
  global_max_parallel_requests: 50
