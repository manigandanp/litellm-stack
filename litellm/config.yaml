# Standalone LiteLLM proxy config for a simple, high-quality model catalog.
#
# Public aliases:
#   - rough-use: summaries, rewriting, stories, everyday content generation
#   - coding: code generation, debugging, refactors, agentic coding
#   - smart-mini: cheap/free small-model work with good quality
#   - smart-large: stronger low-cost reasoning/general work
#
# Priority is expressed with litellm_params.order. Lower order wins, and
# router_settings.enable_pre_call_checks must stay true for order filtering.

model_list:
  - model_name: rough-use
    litellm_params:
      model: "gemini/gemini-2.5-flash-lite"
      api_key: os.environ/GEMINI_API_KEY
      order: 2
      max_parallel_requests: 2
    model_info:
      id: rough-use-gemini-2-5-flash-lite
      mode: chat
      base_model: "gemini/gemini-2.5-flash-lite"
      tags: ["rough-use", "free-tier", "gemini", "google"]

