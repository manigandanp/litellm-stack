# Standalone LiteLLM proxy config.
#
# model_list has three layers:
#   1. Model-family groups: every distinct model is its own model_name group,
#      with all of its providers under it (load-balanced by order).
#   2. Use-case aliases (rough-use, coding, smart-mini, smart-large): a
#      compatibility layer that most clients call.
#   3. Capability-filtered aliases (rough-use-reasoning, rough-use-instant,
#      coding-reasoning, coding-instant): reasoning-vs-instant split of
#      rough-use and coding.
#
# Every deployment carries supports_function_calling and supports_reasoning
# flags in model_info for capability-aware routing.
#
# Priority is litellm_params.order (lower wins). Keep
# router_settings.enable_pre_call_checks: true for order filtering.

model_list:

